<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
<div class="container mt-5">
    <h2>Create Post</h2>
    <div class="mb-3">
        <label>Author</label>
        <input id="authorName"
               class="form-control">
    </div>
    <div class="mb-3">
        <label>Password</label>
        <input type="password"
               id="password"
               class="form-control">
    </div>
    <div class="mb-3">
        <label>Title</label>
        <input id="title"
               class="form-control">
    </div>
    <div class="mb-3">
        <label>Content</label>
        <textarea id="content"
                  class="form-control"
                  rows="5"></textarea>
    </div>
    <button class="btn btn-primary" onclick="createPost()">Register</button>
    <a href="list.html" class="btn btn-secondary">Cancel</a>
</div>

<script src="js/create.js"></script>

</body>
</html>
